# --------------------------------------
# Docker Compose - CI/CD Platform
# Services: Gitea, Jenkins, Private Registry
# Production practices:
#   - Pinned image versions (no :latest)
#   - Jenkins runs as jenkins user (not root)
#   - No privileged mode
#   - TLS on registry
# --------------------------------------

networks:
  cicd-net:
    external: true
    name: big-project-2-cicd-pipeline_cicd-net

services:
  gitea:
    image: gitea/gitea:1.25.4
    container_name: gitea-server
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__webhook__ALLOWED_HOST_LIST=jenkins-server,loopback,private
    volumes:
      - gitea-data:/data
    ports:
      - "8081:3000"
      - "222:22"
    networks:
      - cicd-net
    restart: unless-stopped

  jenkins:
    build:
      context: .
      dockerfile: jenkins/dockerfile
    container_name: jenkins-server
    # No privileged mode - Jenkins runs as the jenkins user (docker group member)
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
    volumes:
      - jenkins-data:/var/jenkins_home
      # Docker socket is mounted so Jenkins can build images.
      # Jenkins user is added to the docker group in the Dockerfile.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - cicd-net
    restart: unless-stopped

  registry:
    image: registry:2.8.3
    container_name: local-docker-registry
    environment:
      - REGISTRY_HTTP_ADDR=0.0.0.0:5000
      - REGISTRY_HTTP_TLS_CERTIFICATE=/certs/local-docker-registry.pem
      - REGISTRY_HTTP_TLS_KEY=/certs/local-docker-registry-key.pem
    volumes:
      - ./certs:/certs:ro
      - registry-data:/var/lib/registry
    ports:
      - "5000:5000"
    networks:
      - cicd-net
    restart: unless-stopped

volumes:
  gitea-data:
  jenkins-data:
  registry-data:
