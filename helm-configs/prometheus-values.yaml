# ----------------------------------------
# Overrides for kube-prometheus-stack Helm chart
# Target: Local development using k3d
# Purpose: Reduce resource usage, simplify setup
# Production note: Change adminPassword before any cloud deployment
# ----------------------------------------

# Alertmanager not needed for local setup
alertmanager:
  enabled: false

grafana:
  service:
    type: NodePort
    nodePort: 30900

  # Local-only password. For cloud/production, use a Kubernetes Secret instead:
  # kubectl create secret generic grafana-admin-secret \
  #   --from-literal=admin-user=admin \
  #   --from-literal=admin-password=<strong-password> -n monitoring
  adminPassword: "LocalDevOnly-ChangeMe!"

prometheus:
  prometheusSpec:
    # Dev Note: Reduce resource usage for local testing.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

    retention: 5d
    # Dev Note: Disable long-term storage for local testing.
    remoteWrite: []

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
