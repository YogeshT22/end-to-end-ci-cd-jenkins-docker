# IMPORTANT: The server URL must use the k3d loadbalancer container hostname,
# NOT host.docker.internal. The k3d serverlb hostname is present in the API
# server TLS certificate SANs; host.docker.internal is NOT, causing x509 errors.
#
# The script 04-configure-kubernetes.sh generates this file automatically.
# Use this template only if you are building the kubeconfig manually.
apiVersion: v1
kind: Config
clusters:
  - name: k3d-devops-cluster
    cluster:
      server: https://k3d-devops-cluster-serverlb:6443
      certificate-authority-data: YOUR_BASE64_CA_HERE
users:
  - name: jenkins-admin
    user:
      token: YOUR_SERVICE_ACCOUNT_TOKEN_HERE
contexts:
  - name: jenkins-context
    context:
      cluster: k3d-devops-cluster
      user: jenkins-admin
      namespace: default
current-context: jenkins-context
